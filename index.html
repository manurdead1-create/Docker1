<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>WardenX | Portal</title>
  <link rel="icon" type="image/png" href="https://ik.imagekit.io/soiz1wejp/upscalemedia-transformed.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505; --bg2: #0a0a0f; --bg3: #0f0f1a;
      --border: #1a1a2e; --border2: #2a2a40;
      --text: #d1d5db; --muted: #64748b; --muted2: #94a3b8;
      --blue: #5196ff; --purple: #7c5cff; --green: #34d399; --red: #f87171; --yellow: #f59e0b;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem; border-bottom: 1px solid var(--border);
      background: rgba(5,5,5,0.97); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { display: flex; align-items: center; gap: .625rem; }
    .nav-logo img { width: 32px; height: 32px; filter: drop-shadow(0 0 8px rgba(81,150,255,.55)); }
    .nav-logo span { font-weight: 800; font-size: 18px; color: #fff; }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a { color: var(--muted2); font-size: 14px; font-weight: 500; transition: color .2s; }
    .nav-links a:hover { color: var(--blue); }
    .page { display: none; padding: 4rem 2rem; max-width: 1100px; margin: 0 auto; }
    .page.active { display: block; }
    .btn-primary { background: var(--blue); color: #000; border: none; padding: .6rem 1.25rem; border-radius: 8px; font-weight: 700; font-size: 13px; transition: .2s; cursor: pointer; }
    .btn-primary:hover { background: #4085ee; }
    .btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border2); padding: .6rem 1.25rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: .2s; }
    .btn-ghost:hover { border-color: var(--blue); }
    .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: #fff; padding: .75rem 1rem; border-radius: 8px; outline: none; transition: .2s; }
    .form-input:focus { border-color: var(--blue); }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 2rem; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .sc-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: .5rem; }
    .sc-val { font-size: 24px; font-weight: 800; color: #fff; }
    .status-pill { display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid rgba(52, 211, 153, 0.3); background: rgba(52, 211, 153, 0.1); color: var(--green); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); }
    .session-item { display: flex; justify-content: space-between; padding: .75rem 0; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 13px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">
      <img src="https://ik.imagekit.io/soiz1wejp/upscalemedia-transformed.png" alt="WardenX" />
      <span>WardenX</span>
    </div>
    <div class="nav-links">
      <a href="javascript:showPage('home-page')">Home</a>
      <a href="javascript:showPage('dashboard-page')">Stats</a>
      <button class="btn-primary" onclick="window.open('https://discord.gg/nBrEpMJ9hg')">Purchase</button>
    </div>
  </nav>

  <div id="home-page" class="page active" style="text-align: center;">
    <h1 style="font-size: 3.5rem; font-weight: 900; margin-bottom: 1rem; background: linear-gradient(135deg,#5196ff,#818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">WardenX v1.0.1</h1>
    <p style="color: var(--muted); margin-bottom: 2rem;">The professional standard for account monitoring and verification.</p>
    <button class="btn-primary" onclick="showPage('dashboard-page')">Enter Dashboard</button>
  </div>

  <div id="dashboard-page" class="page">
    <div id="stats-login-view" style="max-width: 400px; margin: 0 auto; background: var(--bg2); padding: 2rem; border-radius: 16px; border: 1px solid var(--border); text-align: center;">
      <h3 style="margin-bottom: 1rem;">License Verification</h3>
      <input type="password" id="stats-key-input" class="form-input" placeholder="WARDENX-XXXX-XXXX" style="margin-bottom: 1rem;" />
      <p id="stats-login-error" style="color: var(--red); font-size: 12px; margin-bottom: 1rem; display: none;"></p>
      <button class="btn-primary" style="width: 100%;" onclick="statsLogin()">Login</button>
    </div>

    <div id="stats-dash-view" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
        <div>
          <h2 id="stats-license-display">Dashboard</h2>
          <p style="color: var(--muted); font-size: 13px;">Live global performance</p>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <div class="status-pill" id="stats-status-pill"><div class="status-dot" id="stats-dot"></div><span id="stats-status-text">Live</span></div>
          <button class="btn-ghost" onclick="statsLogout()">Logout</button>
        </div>
      </div>

      <div class="dash-grid">
        <div class="stat-card"><div class="sc-label">Checked</div><div class="sc-val" id="st-checked">0</div></div>
        <div class="stat-card"><div class="sc-label">Hits</div><div class="sc-val" id="st-hits" style="color: var(--green);">0</div></div>
        <div class="stat-card"><div class="sc-label">Bad</div><div class="sc-val" id="st-bad" style="color: var(--red);">0</div></div>
        <div class="stat-card"><div class="sc-label">CPM</div><div class="sc-val" id="st-cpm" style="color: var(--blue);">0</div></div>
      </div>

      <div style="margin-top: 2rem; background: var(--bg2); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border);">
        <h4 style="font-size: 12px; text-transform: uppercase; color: var(--muted2); margin-bottom: 1rem;">Recent Instances</h4>
        <div id="session-items-list"></div>
      </div>
    </div>
  </div>

  <script>
    const LICENSE_SERVER_URL = "https://wardenx.dpdns.org/api/validate";
    const STATS_API_URL = "https://wardenx.dpdns.org/";
    let statsInterval = null;

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    async function statsLogin() {
      const key = document.getElementById('stats-key-input').value.trim();
      const errorText = document.getElementById('stats-login-error');
      if (!key) return;

      try {
        const response = await fetch(LICENSE_SERVER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ license_key: key })
        });
        const result = await response.json();

        if (response.ok && result.status === "success") {
          errorText.style.display = 'none';
          document.getElementById('stats-login-view').style.display = 'none';
          document.getElementById('stats-dash-view').style.display = 'block';
          document.getElementById('stats-license-display').textContent = 'Key: ' + key.substring(0, 10) + '...';
          startStatsPolling();
        } else {
          errorText.textContent = result.message || "Invalid license key.";
          errorText.style.display = 'block';
        }
      } catch (e) {
        errorText.textContent = "Connection to license server failed.";
        errorText.style.display = 'block';
      }
    }

    function startStatsPolling() {
      updateStats();
      statsInterval = setInterval(updateStats, 5000);
    }

    async function updateStats() {
      try {
        const resp = await fetch(STATS_API_URL);
        const data = await resp.json();
        document.getElementById('st-checked').textContent = (data.checked || 0).toLocaleString();
        document.getElementById('st-hits').textContent = (data.hits || 0).toLocaleString();
        document.getElementById('st-bad').textContent = (data.bad || 0).toLocaleString();
        document.getElementById('st-cpm').textContent = (data.cpm || 0).toLocaleString();

        const list = document.getElementById('session-items-list');
        if (data.sessions) {
          list.innerHTML = data.sessions.slice(0, 5).map(s => `
            <div class="session-item">
              <span>ID: ${s.session_id}</span>
              <span style="color:var(--blue)">${(s.hits||0).toLocaleString()} hits</span>
            </div>`).join('');
        }
      } catch (e) {
        document.getElementById('stats-status-pill').style.background = 'rgba(248,113,113,0.1)';
        document.getElementById('stats-status-text').textContent = 'Offline';
        document.getElementById('stats-dot').style.background = 'var(--red)';
      }
    }

    function statsLogout() {
      clearInterval(statsInterval);
      document.getElementById('stats-dash-view').style.display = 'none';
      document.getElementById('stats-login-view').style.display = 'block';
      document.getElementById('stats-key-input').value = '';
    }
  </script>
</body>
</html>
